<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Irrigation API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Irrigation API Test</h1>
    
    <button onclick="testAPI()">Test API Status</button>
    <button onclick="testIrrigationCalculation()">Test Irrigation Calculation</button>
    
    <div id="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');

        function addResult(message, data = null, isSuccess = true) {
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${message}</strong>`;
            
            if (data) {
                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(data, null, 2);
                div.appendChild(pre);
            }
            
            resultsDiv.appendChild(div);
        }

        async function testAPI() {
            try {
                const response = await fetch('http://localhost:8001/api/test');
                const data = await response.json();
                addResult('API Status Test:', data, true);
            } catch (error) {
                addResult('API Status Test Failed:', error.message, false);
            }
        }

        async function testIrrigationCalculation() {
            try {
                const testData = {
                    farmSize: 2.5,
                    unit: "acres",
                    crop: "wheat",
                    soil: "loam",
                    method: "drip",
                    bulkDensity: 1.3,
                    lastIrrigation: "2025-08-05",
                    location: "Tamil Nadu, India"
                };

                const response = await fetch('http://localhost:8001/api/calculate-irrigation', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                addResult('Irrigation Calculation Test:', data, true);
            } catch (error) {
                addResult('Irrigation Calculation Test Failed:', error.message, false);
            }
        }
    </script>
</body>
</html>
