<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Backend Connection</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Backend Connection Test</h1>
    
    <button onclick="testHealth()">Test Health Endpoint</button>
    <button onclick="testCrops()">Test Crops Endpoint</button>
    <button onclick="testAnalysis()">Test Analysis Endpoint</button>
    
    <div id="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');

        function addResult(message, isSuccess = true) {
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }

        async function testHealth() {
            try {
                const response = await fetch('http://localhost:8000/health');
                const data = await response.json();
                addResult(`Health check: ${JSON.stringify(data)}`, true);
            } catch (error) {
                addResult(`Health check failed: ${error.message}`, false);
            }
        }

        async function testCrops() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/crops');
                const data = await response.json();
                addResult(`Crops: ${JSON.stringify(data)}`, true);
            } catch (error) {
                addResult(`Crops test failed: ${error.message}`, false);
            }
        }

        async function testAnalysis() {
            try {
                const testData = {
                    crop_name: "wheat",
                    soil_parameters: {
                        ph: 7.0,
                        salinity: 0.5,
                        texture: "loam",
                        bulk_density: 1.3,
                        nutrients: {
                            nitrogen: 50,
                            phosphorus: 25,
                            potassium: 150,
                            calcium: 2000,
                            magnesium: 300,
                            sulfur: 20,
                            iron: 4.5,
                            manganese: 2.0,
                            zinc: 1.2
                        }
                    }
                };

                const response = await fetch('http://localhost:8000/api/v1/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });

                const data = await response.json();
                addResult(`Analysis test: Score ${data.suitability_score}, Category: ${data.category}`, true);
            } catch (error) {
                addResult(`Analysis test failed: ${error.message}`, false);
            }
        }
    </script>
</body>
</html>
