<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Analysis Frontend Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold text-green-600 mb-6">🧪 Soil Analysis Frontend Test</h1>
        
        <div class="space-y-4">
            <button onclick="testSoilAnalysis()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg">
                🔬 Test Soil Analysis
            </button>
            
            <button onclick="testWithMissingFields()" class="bg-yellow-600 hover:bg-yellow-700 text-white px-6 py-2 rounded-lg">
                ⚠️ Test Missing Fields
            </button>
            
            <button onclick="testServerError()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg">
                ❌ Test Server Error
            </button>
        </div>
        
        <div id="results" class="mt-6 p-4 bg-gray-50 rounded-lg hidden">
            <h3 class="font-bold mb-2">Test Results:</h3>
            <div id="resultContent"></div>
        </div>
        
        <div id="logs" class="mt-6 p-4 bg-black text-green-400 rounded-lg font-mono text-sm hidden">
            <h3 class="text-white font-bold mb-2">Console Logs:</h3>
            <div id="logContent"></div>
        </div>
    </div>

    <script>
        // Capture console logs
        const originalLog = console.log;
        const originalError = console.error;
        const logs = [];
        
        console.log = function(...args) {
            logs.push({type: 'log', message: args.join(' ')});
            originalLog.apply(console, args);
            updateLogs();
        };
        
        console.error = function(...args) {
            logs.push({type: 'error', message: args.join(' ')});
            originalError.apply(console, args);
            updateLogs();
        };
        
        function updateLogs() {
            const logContent = document.getElementById('logContent');
            const logsDiv = document.getElementById('logs');
            logsDiv.classList.remove('hidden');
            
            logContent.innerHTML = logs.map(log => 
                `<div class="${log.type === 'error' ? 'text-red-400' : 'text-green-400'}">${log.type.toUpperCase()}: ${log.message}</div>`
            ).join('');
        }
        
        function showResults(title, data) {
            const results = document.getElementById('results');
            const content = document.getElementById('resultContent');
            results.classList.remove('hidden');
            
            content.innerHTML = `
                <h4 class="font-bold text-lg mb-2">${title}</h4>
                <pre class="bg-white p-3 rounded border text-sm overflow-auto">${JSON.stringify(data, null, 2)}</pre>
            `;
        }
        
        function showError(message) {
            // Same error function as in the main page
            const errorDiv = document.createElement('div');
            errorDiv.className = 'fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            errorDiv.innerHTML = `
                <div class="flex items-center">
                    <span class="mr-2">❌</span>
                    <span>${message}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-4 text-white hover:text-gray-200">×</button>
                </div>
            `;
            document.body.appendChild(errorDiv);
            
            setTimeout(() => {
                if (errorDiv.parentElement) {
                    errorDiv.remove();
                }
            }, 5000);
        }
        
        function displayResult(result) {
            // Same display function as in the main page (simplified)
            console.log('displayResult called with:', result);
            
            if (!result || typeof result !== 'object') {
                console.error('Invalid result object:', result);
                showError('Invalid analysis result received');
                return;
            }
            
            const categoryEmoji = {
                'excellent': '🟢',
                'average': '🟡',
                'bad': '🔴'
            };
            
            const category = result.category || 'unknown';
            const score = result.suitability_score || 0;
            const message = result.message || 'No analysis available';
            
            console.log(`Category: ${category}, Score: ${score}, Message: ${message}`);
            
            // Test the problematic toUpperCase call
            try {
                const categoryUpper = category.toUpperCase();
                console.log(`Category uppercase: ${categoryUpper}`);
            } catch (error) {
                console.error('Error in toUpperCase:', error);
                showError('Error processing category');
                return;
            }
            
            showResults('Analysis Result', {
                category: category,
                categoryUpper: category.toUpperCase(),
                score: score.toFixed(1),
                message: message,
                emoji: categoryEmoji[category] || '⚪'
            });
        }
        
        async function testSoilAnalysis() {
            console.log('🧪 Testing normal soil analysis...');
            
            const testData = {
                crop_name: "tomato",
                soil_parameters: {
                    ph: 6.5,
                    salinity: 1.2,
                    texture: "loam",
                    bulk_density: 1.3,
                    nutrients: {
                        nitrogen: 120,
                        phosphorus: 25,
                        potassium: 45
                    }
                }
            };
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                console.log('✅ API Response received:', result);
                
                if (!result.success) {
                    throw new Error(result.error || 'Analysis failed');
                }
                
                displayResult(result);
                
            } catch (error) {
                console.error('❌ Test failed:', error);
                showError(`Test failed: ${error.message}`);
            }
        }
        
        async function testWithMissingFields() {
            console.log('⚠️ Testing with missing fields...');
            
            // Simulate a response with missing category
            const mockResult = {
                success: true,
                crop_name: "wheat",
                suitability_score: 85.5,
                // category: undefined, // Missing category
                message: "Good soil conditions"
            };
            
            console.log('Testing with mock result:', mockResult);
            displayResult(mockResult);
        }
        
        async function testServerError() {
            console.log('❌ Testing server error...');
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/nonexistent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });
                
                console.log('Response status:', response.status);
                showResults('Server Error Test', {
                    status: response.status,
                    statusText: response.statusText
                });
                
            } catch (error) {
                console.error('Expected error:', error);
                showError(`Expected error: ${error.message}`);
            }
        }
        
        // Auto-run basic test on page load
        window.addEventListener('load', () => {
            console.log('🚀 Soil Analysis Frontend Test Page Loaded');
            console.log('Click buttons to run tests');
        });
    </script>
</body>
</html>
